name: IRIS Auto DPO Training

on:
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch:

jobs:
  check-and-train:
    runs-on: ubuntu-latest
    steps:
      - name: Check RLAIF data count
        id: check
        run: |
          RESPONSE=$(curl -s -H "X-API-Key: ${{ secrets.IRIS_API_KEY }}" \
            -X POST \
            https://whatpull-iris-assistant.hf.space/trigger-dpo)
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))")
          COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('rlaif_count',0))")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "RLAIF count: $COUNT, Status: $STATUS"

      - name: Install Kaggle CLI
        if: steps.check.outputs.status == 'ready'
        run: |
          pip install kaggle
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Pull and inject secrets into notebook
        if: steps.check.outputs.status == 'ready'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          IRIS_API_KEY: ${{ secrets.IRIS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          kaggle kernels pull whatpull/iris-auto-dpo -p ./notebook -m

          python3 << 'INJECT'
          import json, os

          nb_path = "./notebook/iris-auto-dpo.ipynb"
          with open(nb_path, "r") as f:
              nb = json.load(f)

          hf = os.environ.get("HF_TOKEN", "").replace("'", "\\'")
          iris = os.environ.get("IRIS_API_KEY", "").replace("'", "\\'")
          anthropic = os.environ.get("ANTHROPIC_API_KEY", "").replace("'", "\\'")

          secret_cell = {
              "cell_type": "code",
              "execution_count": None,
              "metadata": {},
              "outputs": [],
              "source": [
                  "import os\n",
                  f"os.environ['HF_TOKEN'] = '{hf}'\n",
                  f"os.environ['IRIS_API_KEY'] = '{iris}'\n",
                  f"os.environ['ANTHROPIC_API_KEY'] = '{anthropic}'\n",
                  "print('✅ 환경변수 주입 완료')\n"
              ]
          }

          nb["cells"].insert(0, secret_cell)

          with open(nb_path, "w") as f:
              json.dump(nb, f)

          print("✅ 시크릿 주입 완료 (따옴표 이스케이프 적용)")
          INJECT

      - name: Push notebook to Kaggle
        if: steps.check.outputs.status == 'ready'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          IRIS_API_KEY: ${{ secrets.IRIS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # kernel-metadata.json에서 인터넷 활성화 확인
          cd ./notebook
          python3 << 'META'
          import json
          with open("kernel-metadata.json", "r") as f:
              meta = json.load(f)
          meta["enable_internet"] = True
          meta["enable_gpu"] = True
          meta["is_internet_enabled"] = True
          meta["is_gpu_enabled"] = True
          with open("kernel-metadata.json", "w") as f:
              json.dump(meta, f, indent=2)
          print("✅ 메타데이터:", json.dumps(meta, indent=2))
          META

          kaggle kernels push -p .
          echo "🚀 Kaggle DPO 노트북 트리거 완료!"

      - name: Skip - insufficient data
        if: steps.check.outputs.status != 'ready'
        run: |
          echo "RLAIF data: ${{ steps.check.outputs.count }} (need 50+)"
          echo "Skipping DPO training"

      - name: Summary
        run: |
          echo "### IRIS Auto DPO" >> $GITHUB_STEP_SUMMARY
          echo "- RLAIF Count: ${{ steps.check.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.check.outputs.status }}" >> $GITHUB_STEP_SUMMARY
