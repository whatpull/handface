<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>handface — J.A.R.V.I.S</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000810;
      color: #FFAA44;
      font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
    }

    #canvas-container { position: fixed; inset: 0; }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      width: 18px; height: 18px;
      border: 1.5px solid rgba(255, 160, 0, 0.9);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 200;
      box-shadow: 0 0 12px rgba(255, 140, 0, 0.5);
      transition: transform 0.08s, background 0.08s;
    }
    #cursor::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255, 160, 0, 0.18);
    }
    #cursor.clicking {
      background: rgba(255, 150, 0, 0.3);
      transform: translate(-50%, -50%) scale(1.7);
      border-color: #FFDD44;
    }

    /* ── Corner HUD brackets ── */
    .hud-corner {
      position: fixed;
      width: 24px; height: 24px;
      z-index: 10;
      opacity: 0.55;
    }
    .hud-corner::before, .hud-corner::after {
      content: '';
      position: absolute;
      background: #FF9900;
    }
    .hud-corner::before { width: 2px; height: 100%; }
    .hud-corner::after  { width: 100%; height: 2px; }
    .hud-corner.tl { top: 14px; left: 14px; }
    .hud-corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .hud-corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .hud-corner.br { bottom: 14px; right: 14px; transform: scale(-1); }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,8,16,0.7) 0%, transparent 100%);
    }
    header h1 {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #FFAA44;
    }
    .badge {
      font-size: 0.58rem;
      background: rgba(255, 153, 0, 0.15);
      color: #FF9900;
      border: 1px solid rgba(255, 153, 0, 0.35);
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .sub {
      font-size: 0.65rem;
      color: #FF7700;
      opacity: 0.65;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── Gesture Guide ── */
    #guide {
      position: fixed;
      bottom: 32px; left: 28px;
      z-index: 10;
    }
    #guide h3 {
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #FF7700;
      opacity: 0.55;
      margin-bottom: 12px;
    }
    .g-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .g-row:last-child { margin-bottom: 0; }
    .g-icon { font-size: 0.95rem; width: 22px; text-align: center; }
    .g-label { font-size: 0.68rem; color: #FFAA44; opacity: 0.72; letter-spacing: 0.02em; }

    /* ── Stats ── */
    #stats {
      position: fixed;
      top: 62px; right: 24px;
      z-index: 10;
      min-width: 195px;
    }
    #stats h3 {
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #FF7700;
      opacity: 0.55;
      margin-bottom: 12px;
    }
    .s-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 7px;
      font-size: 0.68rem;
    }
    .s-row:last-child { margin-bottom: 0; }
    .s-label { color: #FF8800; opacity: 0.5; letter-spacing: 0.08em; }
    .s-val { color: #FFCC44; letter-spacing: 0.04em; }

    /* ── Event Log ── */
    #log {
      position: fixed;
      bottom: 32px; right: 24px;
      z-index: 10;
      width: 215px;
    }
    #log h3 {
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #FF7700;
      opacity: 0.55;
      margin-bottom: 10px;
    }
    .log-item {
      font-size: 0.65rem;
      color: #FF8800;
      opacity: 0.5;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-item.ev-click  { color: #FFDD44; opacity: 1; }
    .log-item.ev-scroll { color: #FF9900; opacity: 0.9; }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,150,0,0.2) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    #flash.on { opacity: 1; transition: none; }
    #flash:not(.on) { transition: opacity 0.38s ease-out; }

    /* ── Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(0, 8, 16, 0.97);
      z-index: 300;
      transition: opacity 0.6s;
    }
    #overlay.fade-out { opacity: 0; pointer-events: none; }

    .ov-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #FF7700;
      opacity: 0.65;
    }
    .ov-title {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #FF9900;
      text-shadow: 0 0 40px rgba(255,153,0,0.55), 0 0 80px rgba(255,100,0,0.2);
      text-align: center;
      line-height: 1.15;
    }
    .ov-title span { color: #FFCC44; font-size: 0.55em; letter-spacing: 0.3em; display: block; margin-top: 4px; }
    .ov-desc {
      font-size: 0.8rem;
      color: #FF8800;
      opacity: 0.5;
      text-align: center;
      max-width: 280px;
      line-height: 1.85;
      letter-spacing: 0.04em;
    }
    .ov-gestures {
      display: flex;
      gap: 36px;
      margin: 4px 0;
    }
    .ov-g {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.55;
    }
    .ov-g-icon  { font-size: 1.55rem; }
    .ov-g-label { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: #FF9900; }

    #start-btn {
      margin-top: 4px;
      padding: 12px 44px;
      background: transparent;
      color: #FF9900;
      border: 1px solid rgba(255, 153, 0, 0.55);
      border-radius: 2px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    #start-btn:hover:not(:disabled) {
      background: rgba(255, 153, 0, 0.1);
      border-color: #FF9900;
      box-shadow: 0 0 20px rgba(255, 153, 0, 0.25);
    }
    #start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #load-msg {
      font-size: 0.62rem;
      color: #FF7700;
      opacity: 0.5;
      min-height: 1.2em;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="cursor"></div>
  <div id="flash"></div>

  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <header>
    <h1>handface</h1>
    <span class="badge">demo</span>
    <span class="sub">J.A.R.V.I.S</span>
  </header>

  <div id="guide">
    <h3>Control</h3>
    <div class="g-row"><span class="g-icon">👁️</span><span class="g-label">시선 → 커서 / 회전</span></div>
    <div class="g-row"><span class="g-icon">🤌</span><span class="g-label">엄지+검지 핀치 → 클릭</span></div>
    <div class="g-row"><span class="g-icon">✊</span><span class="g-label">주먹 → 줌아웃</span></div>
    <div class="g-row"><span class="g-icon">🖐️</span><span class="g-label">펼친 손 → 줌인</span></div>
  </div>

  <div id="stats">
    <h3>System Status</h3>
    <div class="s-row"><span class="s-label">STATUS</span><span class="s-val" id="s-status">STANDBY</span></div>
    <div class="s-row"><span class="s-label">CURSOR</span><span class="s-val" id="s-pos">— · —</span></div>
    <div class="s-row"><span class="s-label">EVENTS</span><span class="s-val" id="s-clicks">0</span></div>
    <div class="s-row"><span class="s-label">ZOOM</span><span class="s-val" id="s-zoom">50%</span></div>
  </div>

  <div id="log">
    <h3>Event Log</h3>
  </div>

  <div id="overlay">
    <div class="ov-eyebrow">handface · AI Interface</div>
    <div class="ov-title">
      J.A.R.V.I.S
      <span>Holographic Interface</span>
    </div>
    <p class="ov-desc">시선으로 홀로그램을 제어합니다.<br>카메라 권한을 허용하면 시작됩니다.</p>
    <div class="ov-gestures">
      <div class="ov-g"><span class="ov-g-icon">👁️</span><span class="ov-g-label">Gaze</span></div>
      <div class="ov-g"><span class="ov-g-icon">🤌</span><span class="ov-g-label">Click</span></div>
      <div class="ov-g"><span class="ov-g-icon">✊</span><span class="ov-g-label">Zoom</span></div>
    </div>
    <button id="start-btn" type="button">INITIALIZE</button>
    <div id="load-msg"></div>
  </div>

  <script type="module" src="./scene.js"></script>
</body>
</html>
