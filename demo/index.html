<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>handface — Neural Mesh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #0a0e1f 0%, #1a1426 55%, #3a1a14 100%);
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      min-height: 100vh;
    }
    .snn-mono,
    .snn-layer-label,
    .nf-section-label,
    #neuronface-settings .nf-title,
    #neuronface-settings .nf-field input,
    #neuronface-settings .nf-field label,
    #neuronface-settings #nf-status {
      font-family: 'Roboto Mono', ui-monospace, Menlo, Consolas, monospace;
      font-feature-settings: 'tnum';
    }

    /* ── Camera Preview (default hidden, snn-viz mount 시 표시 + layer 안으로 이동) ── */
    #cam-preview {
      display: none;
      transform: scaleX(-1);
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      opacity: 0.85;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,150,0,0.2) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    #flash.on { opacity: 1; transition: none; }
    #flash:not(.on) { transition: opacity 0.38s ease-out; }

    /* ── NeuronFace Settings FAB (panel 색감 정합) ── */
    #nf-settings-fab {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(12, 18, 32, 0.85);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-color 0.3s, color 0.3s, box-shadow 0.3s;
    }
    #nf-settings-fab:hover {
      transform: translateY(-2px) scale(1.05);
      border-color: rgba(77, 208, 225, 0.5);
      color: #4dd0e1;
      box-shadow: 0 0 18px rgba(77, 208, 225, 0.18);
    }
    #nf-settings-fab:active {
      transform: translateY(0) scale(0.96);
      transition-duration: 0.1s;
    }
    #nf-settings-fab.mode-edit {
      border-color: rgba(245, 184, 66, 0.55);
      color: #f5b842;
      box-shadow: 0 0 18px rgba(245, 184, 66, 0.25);
    }
    #nf-settings-fab.mode-edit:hover {
      box-shadow: 0 0 24px rgba(245, 184, 66, 0.35);
    }

    /* Settings panel — panel 색감 정합 */
    #neuronface-settings {
      position: fixed;
      right: 20px;
      bottom: 84px;
      width: 280px;
      background: rgba(12, 18, 32, 0.85);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.85);
      padding: 14px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 999;
      display: none;
    }
    #neuronface-settings.open { display: block; }

    #neuronface-settings .nf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    #neuronface-settings .nf-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
    }
    #nf-settings-close {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.18s;
    }
    #nf-settings-close:hover { color: rgba(255, 255, 255, 0.85); }

    #neuronface-settings .nf-field {
      margin-bottom: 8px;
    }
    #neuronface-settings .nf-field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 4px;
    }
    #neuronface-settings .nf-field input {
      width: 100%;
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.3);
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      font-size: 11px;
      outline: none;
      transition: border-color 0.18s;
    }
    #neuronface-settings .nf-field input:focus {
      border-color: rgba(77, 208, 225, 0.4);
    }
    #neuronface-settings .nf-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    #neuronface-settings .nf-actions button {
      flex: 1;
      padding: 6px 8px;
      background: rgba(77, 208, 225, 0.1);
      color: #4dd0e1;
      border: 1px solid rgba(77, 208, 225, 0.3);
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }
    #neuronface-settings .nf-actions button:hover {
      background: rgba(77, 208, 225, 0.2);
      border-color: rgba(77, 208, 225, 0.5);
    }
    #neuronface-settings #nf-status {
      margin-top: 8px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ────── SNN viz (7-layer Mixed, dark tone) ────── */
    #snn-viz-root {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      z-index: 50;
      pointer-events: auto;
    }
    .snn-main {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      padding: 24px;
      min-height: 0;
    }
    .snn-input-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .snn-circuit-col {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .snn-flow {
      display: grid;
      grid-template-columns: minmax(80px, 1fr) auto minmax(160px, 3fr) auto minmax(160px, 3fr) auto minmax(64px, 1fr);
      align-items: stretch;
      gap: 12px;
      height: 100%;
      position: relative;
    }

    /* Region frame: wraps panel + dots overlay so dots escape panel's backdrop-filter stacking */
    .snn-region-frame {
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }
    /* input-col 의 flex column 안에서 3 frame 균등 분배 (frame 도입 전 .snn-layer 비율 정합).
       .snn-flow 의 grid item 인 INPUT/V1/V2/OUT frame 은 flex 무관, grid 분배가 우선. */
    .snn-input-col > .snn-region-frame {
      flex: 1;
      min-height: 0;
    }
    .snn-region-frame > .snn-layer {
      flex: 1;
      border: none;  /* 사각형 border 제거, 4 corner bracket 으로 대체 */
      position: relative;
      min-height: 0;
    }
    /* 4 corner brackets per region (frame ::before/::after = top corners, layer ::before/::after = bottom corners).
       8×8px / 1.5px solid / inset 0 통일 — frame 과 layer 가 동일 크기 (layer flex:1) → 시각 inset 정합 */
    .snn-region-frame::before,
    .snn-region-frame::after,
    .snn-region-frame > .snn-layer::before,
    .snn-region-frame > .snn-layer::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      pointer-events: none;
    }
    /* TL */
    .snn-region-frame::before {
      top: 0; left: 0;
      border-top: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
      border-left: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
    }
    /* TR */
    .snn-region-frame::after {
      top: 0; right: 0;
      border-top: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
      border-right: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
    }
    /* BL */
    .snn-region-frame > .snn-layer::before {
      bottom: 0; left: 0;
      border-bottom: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
      border-left: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
    }
    /* BR */
    .snn-region-frame > .snn-layer::after {
      bottom: 0; right: 0;
      border-bottom: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
      border-right: 1.5px solid var(--bracket-color, rgba(255,255,255,0.3));
    }
    /* Region별 bracket 색 */
    .snn-region-frame-input   { --bracket-color: rgba(245, 184, 66, 0.4); }
    .snn-region-frame-v1      { --bracket-color: rgba(77, 208, 225, 0.4); }
    .snn-region-frame-v2      { --bracket-color: rgba(183, 148, 244, 0.4); }
    .snn-region-frame-out     { --bracket-color: rgba(94, 234, 212, 0.4); }
    .snn-region-frame-camera  { --bracket-color: rgba(244, 114, 182, 0.4); }
    .snn-region-frame-hand    { --bracket-color: rgba(245, 184, 66, 0.4); }
    .snn-region-frame-gesture { --bracket-color: rgba(183, 148, 244, 0.4); }
    /* Dots overlay — sibling of panel, top: SVG (z:5) below, dots above */
    .snn-layer-dots {
      position: absolute;
      pointer-events: none;
      z-index: 6;
      /* default = panel content area approx (14px padding + ~26px label area).
         alignDotsOverlay() 가 정확한 px 로 덮어씀. align 실패해도 default 가 안전. */
      top: 40px;
      left: 14px;
      right: 14px;
      bottom: 14px;
    }
    .snn-layer-dots .snn-node {
      pointer-events: auto;
    }

    .snn-layer {
      background: rgba(12, 18, 32, 0.55);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: border-color 0.4s, box-shadow 0.4s;
      position: relative;
      z-index: 1;
    }
    .snn-layer.region-active {
      border-color: rgba(77, 208, 225, 0.4);
      box-shadow: 0 0 0 1px rgba(77, 208, 225, 0.18), 0 4px 24px rgba(77, 208, 225, 0.12);
    }
    .snn-layer-label {
      font-family: 'Roboto Mono', ui-monospace, monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .snn-layer-label::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }
    .snn-layer-input   .snn-layer-label::before { background: #f5b842; }
    .snn-layer-v1      .snn-layer-label::before { background: #4dd0e1; }
    .snn-layer-v2      .snn-layer-label::before { background: #b794f4; }
    .snn-layer-out     .snn-layer-label::before { background: #5eead4; }
    .snn-layer-camera  .snn-layer-label::before { background: #f472b6; }
    .snn-layer-hand    .snn-layer-label::before { background: #f5b842; }
    .snn-layer-gesture .snn-layer-label::before { background: #b794f4; }
    .snn-layer-body {
      flex: 1;
      position: relative;
      min-height: 0;
      z-index: 1;
    }
    .snn-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.22);
      transition: color 0.3s, text-shadow 0.3s, transform 0.4s;
      -webkit-user-select: none;
      user-select: none;
    }
    .snn-arrow.fired {
      color: #7DD3FC;
      text-shadow: 0 0 12px rgba(125, 211, 252, 0.85), 0 0 24px rgba(125, 211, 252, 0.4);
      transform: scale(1.18);
    }

    /* Synapse SVG overlay — panel 위로 (z-index 5), panel 경계에서 line 끊김 방지 */
    .snn-synapse-svg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: visible;
    }

    /* Camera layer override — <video> off-screen (display:none 은 frame buffer 진행 차단,
       가로 줄무늬 패턴 발생). frame buffer 살리기 위해 layout 진입 + 시각만 숨김. */
    .snn-layer-camera .snn-layer-body #cam-preview {
      position: absolute !important;
      left: -9999px !important;
      top: 0 !important;
      width: 320px !important;
      height: 240px !important;
      opacity: 0 !important;
      pointer-events: none !important;
      visibility: visible !important;
    }

    .snn-hand-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }

    /* Gesture 4 아이콘 grid */
    .snn-gesture-icons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      height: 100%;
      align-content: center;
    }
    .snn-gesture-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 6px;
      transition: background 0.3s, transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .snn-gesture-icon-emoji { font-size: 22px; }
    .snn-gesture-icon-label {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .snn-gesture-icon.active {
      background: rgba(196, 181, 253, 0.35);
      border-color: rgba(196, 181, 253, 0.65);
      box-shadow: 0 0 18px rgba(196, 181, 253, 0.35);
      transform: scale(1.08);
    }

    /* Neuron nodes — region color + halo */
    .snn-node {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      cursor: default;
      z-index: 3;
    }
    .snn-node.input { background: #f5b842; box-shadow: 0 0 4px #f5b842, 0 0 12px rgba(245, 184, 66, 0.5); }
    .snn-node.v1    { background: #4dd0e1; box-shadow: 0 0 4px #4dd0e1, 0 0 12px rgba(77, 208, 225, 0.5); }
    .snn-node.v2    { background: #b794f4; box-shadow: 0 0 4px #b794f4, 0 0 12px rgba(183, 148, 244, 0.5); }
    .snn-node.out   { background: #5eead4; box-shadow: 0 0 4px #5eead4, 0 0 12px rgba(94, 234, 212, 0.5); }

    /* Fire burst — radial #ff8b3d, scale 1→1.6, opacity 1→0, 200ms ease-out */
    @keyframes snn-fire-burst {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
    }
    .snn-node.fired::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 139, 61, 0.85) 0%, rgba(255, 139, 61, 0) 70%);
      pointer-events: none;
      animation: snn-fire-burst 200ms ease-out forwards;
    }
    #snn-viz-root.editing .snn-node { cursor: grab; }
    #snn-viz-root.editing .snn-node:active { cursor: grabbing; }

    /* Settings panel — Mode section */
    .nf-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .nf-section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      display: block;
    }
    .nf-mode-toggle { display: flex; gap: 4px; }
    .nf-mode-btn {
      flex: 1;
      padding: 6px 0;
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }
    .nf-mode-btn:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); }
    .nf-mode-btn.active {
      background: rgba(77, 208, 225, 0.15);
      color: #4dd0e1;
      border-color: #4dd0e1;
    }
    .nf-mode-hint {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }

    /* 모바일 반응형 (768px 이하) */
    @media (max-width: 768px) {
      .snn-main {
        grid-template-columns: 1fr;
        grid-template-rows: 180px 1fr;
        padding: 16px;
      }
      .snn-input-col { flex-direction: row; }
      .snn-input-col .snn-layer { flex: 1; min-width: 0; }
      .snn-flow {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .snn-arrow { display: none; }
    }
  </style>
</head>
<body>
  <div id="snn-viz-root"></div>

  <video id="cam-preview" autoplay muted playsinline></video>
  <div id="flash"></div>

  <button id="nf-settings-fab" type="button" aria-label="Open NeuronFace settings">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <div id="neuronface-settings">
    <div class="nf-header">
      <span class="nf-title">NeuronFace Settings</span>
      <button id="nf-settings-close" type="button" aria-label="Close">✕</button>
    </div>
    <div class="nf-field">
      <label>Endpoint</label>
      <input id="nf-endpoint" type="text"
        placeholder="https://whatpull-neuronface.hf.space" />
    </div>
    <div class="nf-field">
      <label>API Key</label>
      <input id="nf-apikey" type="password"
        placeholder="nf_live_..." autocomplete="off" />
    </div>
    <div class="nf-actions">
      <button id="nf-save" type="button">Save</button>
      <button id="nf-test" type="button">Test</button>
    </div>
    <div id="nf-status">not tested</div>

    <div class="nf-section nf-mode-section">
      <label class="nf-section-label">Mode</label>
      <div class="nf-mode-toggle">
        <button id="nf-mode-normal" type="button" class="nf-mode-btn active">Normal</button>
        <button id="nf-mode-edit" type="button" class="nf-mode-btn">Edit</button>
      </div>
      <div class="nf-mode-hint">Edit: drag nodes to reposition (saved locally)</div>
    </div>
  </div>

  <script type="module" src="./scene.js"></script>
</body>
</html>
