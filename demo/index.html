<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>handface — Neural Mesh</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000810;
      color: #FFAA44;
      font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      width: 18px; height: 18px;
      border: 1.5px solid rgba(255, 160, 0, 0.9);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 200;
      box-shadow: 0 0 12px rgba(255, 140, 0, 0.5);
      transition: transform 0.08s, background 0.08s;
    }
    #cursor::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255, 160, 0, 0.18);
    }
    #cursor.clicking {
      background: rgba(255, 150, 0, 0.3);
      transform: translate(-50%, -50%) scale(1.7);
      border-color: #FFDD44;
    }

    /* ── Camera Preview ── */
    #cam-preview {
      position: fixed;
      top: 24px; right: 24px;
      transform: scaleX(-1);
      width: 195px;
      border-radius: 6px;
      border: 1px solid rgba(255, 153, 0, 0.35);
      z-index: 25;
      opacity: 0.85;
      display: block;
    }
    #cam-toggle {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 26;
      background: rgba(0,8,16,0.7);
      border: 1px solid rgba(255, 153, 0, 0.35);
      color: #FF9900;
      font-family: 'Courier New', monospace;
      font-size: 0.5rem;
      padding: 2px 8px;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.1em;
    }
    #cam-toggle:hover { background: rgba(255, 153, 0, 0.12); }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,150,0,0.2) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    #flash.on { opacity: 1; transition: none; }
    #flash:not(.on) { transition: opacity 0.38s ease-out; }

    /* ── NeuronFace Settings (floating, bottom-right above ✋ FAB) ── */
    #nf-settings-fab {
      position: fixed;
      right: 20px;
      bottom: 80px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(40, 40, 50, 0.92);
      color: #fff;
      border: 1px solid rgba(255, 170, 68, 0.35);
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s, background 0.18s;
    }
    #nf-settings-fab:hover {
      background: rgba(60, 60, 75, 1);
      transform: scale(1.06);
    }

    #neuronface-settings {
      position: fixed;
      right: 20px;
      bottom: 140px;
      width: 280px;
      background: rgba(0, 0, 0, 0.92);
      color: #eee;
      padding: 14px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      border: 1px solid rgba(255, 170, 68, 0.3);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.55);
      z-index: 999;
      display: none;
    }
    #neuronface-settings.open { display: block; }

    #neuronface-settings .nf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    #neuronface-settings .nf-title {
      font-weight: bold;
      color: #FFAA44;
    }
    #nf-settings-close {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      line-height: 1;
    }
    #nf-settings-close:hover { color: #fff; }

    #neuronface-settings .nf-field {
      margin-bottom: 6px;
    }
    #neuronface-settings .nf-field label {
      display: block;
      opacity: 0.7;
      margin-bottom: 2px;
    }
    #neuronface-settings .nf-field input {
      width: 100%;
      padding: 4px;
      background: #111;
      color: #eee;
      border: 1px solid #333;
      font-family: monospace;
      font-size: 11px;
    }
    #neuronface-settings .nf-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    #neuronface-settings .nf-actions button {
      flex: 1;
      padding: 4px 8px;
      cursor: pointer;
    }
    #neuronface-settings #nf-status {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <video id="cam-preview" autoplay muted></video>
  <button id="cam-toggle" type="button">📷 CAM</button>
  <div id="flash"></div>

  <button id="nf-settings-fab" type="button" aria-label="Open NeuronFace settings">⚙️</button>
  <div id="neuronface-settings">
    <div class="nf-header">
      <span class="nf-title">NeuronFace Settings</span>
      <button id="nf-settings-close" type="button" aria-label="Close">✕</button>
    </div>
    <div class="nf-field">
      <label>Endpoint</label>
      <input id="nf-endpoint" type="text"
        placeholder="https://whatpull-neuronface.hf.space" />
    </div>
    <div class="nf-field">
      <label>API Key</label>
      <input id="nf-apikey" type="password"
        placeholder="nf_live_..." autocomplete="off" />
    </div>
    <div class="nf-actions">
      <button id="nf-save" type="button">Save</button>
      <button id="nf-test" type="button">Test</button>
    </div>
    <div id="nf-status">not tested</div>
  </div>

  <script type="module" src="./scene.js"></script>
</body>
</html>
