<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Behavioral Twin — SNN learns your motion in real-time" />
  <title>Behavioral Twin · SNN Motion Cloning</title>
  <script type="module" crossorigin src="/handface/assets/index-ehypiOTg.js"></script>
  <link rel="stylesheet" crossorigin href="/handface/assets/index-BiUvYjJl.css">
</head>
<body>
  <header class="hud">
    <div class="hud-left">
      <span class="brand">Behavioral Twin</span>
      <span class="brand-sub">SNN learns your motion in real-time</span>
    </div>
    <div class="hud-right">
      <span class="metric"><label>Learning</label><b id="m-learn">0%</b></span>
      <span class="metric"><label>Pattern</label><b id="m-pattern">—</b></span>
      <span class="metric"><label>Spikes/s</label><b id="m-rate">0</b></span>
    </div>
  </header>

  <main class="stage-wrap">
    <canvas id="stage" class="stage"></canvas>
    <div class="instruction" id="instruction">
      <b>마우스를 자유롭게 움직여보세요.</b><br/>
      AI 가 당신의 움직임 패턴을 학습하고 따라합니다.
    </div>
    <div class="legend">
      <span class="legend-item"><span class="dot dot-user"></span> 당신</span>
      <span class="legend-item"><span class="dot dot-ai"></span> AI Twin</span>
    </div>
  </main>

  <footer class="ctrl">
    <button class="btn btn-primary" id="btn-toggle" type="button">
      <span class="btn-emoji">▶</span><span>학습 시작</span>
    </button>
    <button class="btn" id="btn-replay" type="button">
      <span class="btn-emoji">🤖</span><span>AI 자율 행동</span>
    </button>
    <button class="btn" id="btn-reset" type="button">
      <span class="btn-emoji">🔄</span><span>초기화</span>
    </button>
    <span class="status" id="status">준비됨</span>
  </footer>

</body>
</html>
