<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>handface — Crystal Cosmos</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07070f;
      color: #ddddf5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 300vh; /* 스크롤 제스처 데모용 */
    }
    /* 스크롤바 숨기기 (캔버스 위에 겹침 방지) */
    ::-webkit-scrollbar { width: 0; }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      width: 18px; height: 18px;
      border: 2px solid rgba(124,106,247,0.9);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      z-index: 200;
      box-shadow: 0 0 12px rgba(124,106,247,0.5);
      transition: transform 0.08s, background 0.08s, border-color 0.15s;
    }
    #cursor.clicking {
      background: rgba(124,106,247,0.35);
      transform: translate(-50%,-50%) scale(1.6);
      border-color: #a093ff;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(7,7,15,0.85) 0%, transparent 100%);
    }
    header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
    .badge { font-size: 0.63rem; background: #7c6af7; color: #fff; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.03em; }
    .sub { font-size: 0.75rem; opacity: 0.35; margin-left: 2px; }

    /* ── Gesture Guide ── */
    #guide {
      position: fixed;
      bottom: 28px; left: 28px;
      background: rgba(12,12,22,0.75);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px 20px;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      z-index: 10;
    }
    #guide h3 {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.35;
      margin-bottom: 13px;
    }
    .g-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .g-row:last-child { margin-bottom: 0; }
    .g-icon { font-size: 1.05rem; width: 22px; text-align: center; }
    .g-label { font-size: 0.76rem; opacity: 0.7; line-height: 1.4; }

    /* ── Stats ── */
    #stats {
      position: fixed;
      top: 64px; right: 24px;
      background: rgba(12,12,22,0.75);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 14px 20px;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      z-index: 10;
      min-width: 175px;
    }
    #stats h3 {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.35;
      margin-bottom: 11px;
    }
    .s-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 8px; font-size: 0.76rem; }
    .s-row:last-child { margin-bottom: 0; }
    .s-label { opacity: 0.45; }
    .s-val { font-family: 'SF Mono', 'Fira Code', monospace; color: #9d8dff; }

    /* ── Event Log ── */
    #log {
      position: fixed;
      bottom: 28px; right: 24px;
      background: rgba(12,12,22,0.75);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 14px 18px;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      z-index: 10;
      width: 215px;
    }
    #log h3 {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.35;
      margin-bottom: 10px;
    }
    .log-item { font-size: 0.7rem; font-family: monospace; opacity: 0.5; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-item.ev-click { color: #9d8dff; opacity: 1; }
    .log-item.ev-scroll { color: #4ecdc4; opacity: 1; }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(124,106,247,0.25) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    #flash.on { opacity: 1; transition: none; }
    #flash:not(.on) { transition: opacity 0.4s ease-out; }

    /* ── Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(7,7,15,0.96);
      z-index: 300;
      transition: opacity 0.6s;
    }
    #overlay.fade-out { opacity: 0; pointer-events: none; }

    .ov-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.4;
    }
    .ov-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(130deg, #a393ff 0%, #7c6af7 40%, #4ecdc4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      text-align: center;
    }
    .ov-desc {
      font-size: 0.88rem;
      opacity: 0.45;
      text-align: center;
      max-width: 300px;
      line-height: 1.75;
      margin-top: 2px;
    }

    .ov-gestures {
      display: flex;
      gap: 32px;
      margin: 8px 0;
    }
    .ov-g {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.55;
    }
    .ov-g-icon { font-size: 1.7rem; }
    .ov-g-label { font-size: 0.68rem; letter-spacing: 0.04em; }

    #start-btn {
      margin-top: 6px;
      padding: 13px 40px;
      background: linear-gradient(135deg, #7c6af7, #5b4dd4);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 24px rgba(124,106,247,0.35);
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    #start-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124,106,247,0.5);
    }
    #start-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #load-msg { font-size: 0.75rem; opacity: 0.4; min-height: 1.2em; letter-spacing: 0.02em; }
  </style>
  <script type="module" crossorigin src="/handface/assets/index-CXv_r5yk.js"></script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="cursor"></div>
  <div id="flash"></div>

  <header>
    <h1>handface</h1>
    <span class="badge">demo</span>
    <span class="sub">Crystal Cosmos</span>
  </header>

  <div id="guide">
    <h3>Gestures</h3>
    <div class="g-row"><span class="g-icon">🖐️</span><span class="g-label">오른손 위치 → 커서/회전</span></div>
    <div class="g-row"><span class="g-icon">🤌</span><span class="g-label">엄지+검지 핀치 → 클릭</span></div>
    <div class="g-row"><span class="g-icon">✊</span><span class="g-label">손가락 오무림 → 스크롤 다운</span></div>
    <div class="g-row"><span class="g-icon">🖐️</span><span class="g-label">손가락 펼침 → 스크롤 업</span></div>
  </div>

  <div id="stats">
    <h3>Status</h3>
    <div class="s-row"><span class="s-label">상태</span><span class="s-val" id="s-status">대기중</span></div>
    <div class="s-row"><span class="s-label">커서</span><span class="s-val" id="s-pos">— , —</span></div>
    <div class="s-row"><span class="s-label">클릭</span><span class="s-val" id="s-clicks">0</span></div>
    <div class="s-row"><span class="s-label">스크롤</span><span class="s-val" id="s-scroll">0%</span></div>
  </div>

  <div id="log">
    <h3>Event Log</h3>
  </div>

  <div id="overlay">
    <div class="ov-eyebrow">handface · three.js demo</div>
    <div class="ov-title">Crystal<br>Cosmos</div>
    <p class="ov-desc">손동작으로 3D 크리스탈을 제어하세요.<br>카메라 권한을 허용하면 시작됩니다.</p>
    <div class="ov-gestures">
      <div class="ov-g"><span class="ov-g-icon">🖐️</span><span class="ov-g-label">커서이동</span></div>
      <div class="ov-g"><span class="ov-g-icon">🤌</span><span class="ov-g-label">클릭</span></div>
      <div class="ov-g"><span class="ov-g-icon">✊</span><span class="ov-g-label">스크롤↓</span></div>
      <div class="ov-g"><span class="ov-g-icon">🖐️</span><span class="ov-g-label">스크롤↑</span></div>
    </div>
    <button id="start-btn" type="button">시작하기</button>
    <div id="load-msg"></div>
  </div>

</body>
</html>
