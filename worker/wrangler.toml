# Cloudflare Worker (Phase 2 D1 scaffold).
# 사용자 직접 실행 mandatory:
#   1. wrangler login
#   2. wrangler d1 create handface-training
#   3. 본 file 의 database_id 갱신 (위 명령 출력값)
#   4. wrangler d1 execute handface-training --file=./schema.sql --remote
#   5. wrangler deploy
name = "handface-training"
main = "index.js"
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "DB"
database_name = "handface-training"
database_id = "REPLACE_WITH_WRANGLER_OUTPUT"

[vars]
ALLOWED_ORIGIN = "https://whatpull.github.io"
